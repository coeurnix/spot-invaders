<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Spot Invaders</title>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Orbitron:wght@600;800&family=Inter:wght@400;600;700&display=swap"
			rel="stylesheet"
		/>
		<link rel="stylesheet" href="/styles.css" />
		<script async src="https://vibejam.cc/2026/widget.js"></script>
	</head>
	<body>
		<video
			id="media"
			crossorigin="anonymous"
			playsinline
			loop
			preload="auto"
		></video>
		<canvas id="video-frame" aria-hidden="true"></canvas>
		<div id="hit-overlay" aria-hidden="true"></div>
		<canvas id="stage" aria-label="Synchronized multiplayer room"></canvas>
		<section id="hud" aria-label="Game status">
			<div class="hud-score">
				<span>Score</span>
				<strong id="score">0</strong>
			</div>
			<div class="hud-players">
				<span>Players</span>
				<strong id="player-count">0</strong>
			</div>
		</section>
		<section id="title-screen" aria-label="Spot Invaders title screen">
			<div class="title-content">
				<p id="game-over-label" class="game-over-label" hidden>Game Over</p>
				<h1>Spot Invaders</h1>
				<p class="instructions">
					<span>1. Your cursor is your spaceship.</span>
					<span>2. Avoid obstacles and other players!</span>
					<span>3. Click anywhere to start.</span>
				</p>
				<a
					class="credit-link"
					href="https://github.com/coeurnix/spot-invaders"
					target="_blank"
					rel="noopener noreferrer"
					aria-label="Made by Coeurnix on GitHub"
				>
					<span>Made by Coeurnix</span>
					<svg viewBox="0 0 16 16" aria-hidden="true" focusable="false">
						<path
							d="M8 0C3.58 0 0 3.67 0 8.2c0 3.62 2.29 6.69 5.47 7.78.4.08.55-.18.55-.4 0-.2-.01-.85-.01-1.54-2.01.38-2.53-.5-2.69-.96-.09-.24-.48-.96-.82-1.15-.28-.16-.68-.55-.01-.56.63-.01 1.08.59 1.23.84.72 1.24 1.87.89 2.33.68.07-.53.28-.89.51-1.1-1.78-.21-3.64-.91-3.64-4.04 0-.89.31-1.62.82-2.19-.08-.21-.36-1.04.08-2.16 0 0 .67-.22 2.2.84A7.42 7.42 0 0 1 8 3.97c.68 0 1.36.09 2 .27 1.53-1.06 2.2-.84 2.2-.84.44 1.12.16 1.95.08 2.16.51.57.82 1.3.82 2.19 0 3.14-1.87 3.83-3.65 4.04.29.25.54.75.54 1.52 0 1.1-.01 1.98-.01 2.25 0 .22.15.48.55.4A8.17 8.17 0 0 0 16 8.2C16 3.67 12.42 0 8 0Z"
						/>
					</svg>
				</a>
			</div>
			<a id="portal-link" class="portal-link" href="https://vibejam.cc/portal/2026?ref=spot-invaders.coeurnix.party">
				Vibe Jam Portal
			</a>
		</section>
		<script src="/client.js" defer></script>
	</body>
</html>
